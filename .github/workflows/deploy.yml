name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/spacefolio:${{ github.run_number }} .
          docker tag ${{ secrets.DOCKER_USER }}/spacefolio:${{ github.run_number }} ${{ secrets.DOCKER_USER }}/spacefolio:latest

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/spacefolio:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USER }}/spacefolio:latest